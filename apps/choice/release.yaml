apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: choice
  namespace: default
spec:
  interval: 15m
  chart:
    spec:
      chart: ./choice
      version: "0.1.x"
      interval: 15m
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: wisvch
        namespace: flux-system
  values:
    replicaCount: 1
    serviceAccountName: choice
    image:
      repository: ghcr.io/wisvch/choice
      tag: 20240802-5c0c8f5 # {"$imagepolicy": "flux-system:choice:tag"}
    postgres:
      database: choice
      host: 127.0.0.1
      port: 5432
      username: choice@wisvch.iam
      password: choice
      cloudSQL: true
      cloudSQLProxy:
        instanceConnectionName: wisvch:europe-west4:geurt
    hibernate:
      generateDdl: true
      hb2mddl:
        auto: validate
    flyway:
      enable: false
