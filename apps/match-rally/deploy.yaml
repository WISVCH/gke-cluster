apiVersion: apps/v1
kind: Deployment
metadata:
  name: match-rally
  namespace: default
  labels:
    app: match-rally
spec:
  replicas: 1
  selector:
    matchLabels:
      app: match-rally
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      name: match-rally
      labels:
        app: match-rally
    spec:
      containers:
        - name: match-rally69
          image: ghcr.io/wisvch/annu-game-69:20260502-a57018e # {"$imagepolicy": "flux-system:match-rally"}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 150Mi
        - name: match-rally-leaderboard
          image: ghcr.io/wisvch/match-rally-leaderboard:20260502-a60beb7 # {"$imagepolicy": "flux-system:match-rally-leaderboard"}
          imagePullPolicy: IfNotPresent
          ports:
            - name: backend
              containerPort: 5000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/
              port: backend
            initialDelaySeconds: 15
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/
              port: backend
            initialDelaySeconds: 15
            periodSeconds: 20
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 150Mi
          env:
            - name: "BASE"
              value: "/api"
            - name: "DB_BASE"
              value: "/db"
          volumeMounts:
            - mountPath: /db
              name: match-rally-data
      volumes:
        - name: match-rally-data
          persistentVolumeClaim:
            claimName: match-rally-disk
