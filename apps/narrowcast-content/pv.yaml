apiVersion: v1
kind: PersistentVolume
metadata:
  name: narrowcast-content-storage
  labels:
    app: narrowcast-content
spec:
  storageClassName: "standard-retain"
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  claimRef:
    namespace: default
    name: narrowcast-content-disk
  csi:
    driver: pd.csi.storage.gke.io
    volumeHandle: projects/wisvch/zones/europe-west4-c/disks/narrowcast-content-storage
    fsType: ext4
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: default
  name: narrowcast-content-disk
  labels:
    app: narrowcast-content
spec:
  storageClassName: "standard-retain"
  volumeName: narrowcast-content-storage
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
